version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./doc-test:/app/doc-test
      - uploads:/app/uploads
    environment:
      - OCR_PROVIDER=mock
      - DATABASE_URL=sqlite:///./verifydoc.db
      - UPLOAD_DIR=./uploads
      - CORS_ORIGINS=http://localhost:3000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  uploads:
